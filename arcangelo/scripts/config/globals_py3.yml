# This configuration is always loaded for all python3 .py files
# Some rules may be processed just in pass1 (before file update)
#
no_action:
  match: '^.*# (flake8: noqa|pylint: skip-file)'
  ctx: 'pass1 and not force'
  do:
    - action: '+'
      args:
      - 'file_action'
      - 'no'
super:
  match: '^.* *super\([^)]*\)'
  prio: '9'
  do:
    - action: 's'
      args:
      - 'super\([^)]*\)'
      - 'super()'
base64_encode:
  match: '.*base64\.encodestring'
  prio: '9'
  do:
    - action: 's'
      args:
      - 'base64\.encodestring'
      - 'base64.encodebytes'
base64_decode:
  match: '.*base64\.decodestring'
  prio: '9'
  do:
    - action: 's'
      args:
      - 'base64\.decodestring'
      - 'base64.decodebytes'
is_instance_str:
  match: '^.*isinstance\([^,]*, *basestring *\)'
  prio: '9'
  do:
    - action: 's'
      args:
      - 'basestring'
      - 'str'
is_instance_int:
  match: '^.*isinstance\(.*int,.*\) *\)'
  prio: '9'
  do:
    - action: 's'
      args:
      - 'long'
      - ''
    - action: 's'
      args:
      - ', *,'
      - ','
    - action: 's'
      args:
        - ', *\)'
        - ')'
    - action: 's'
      args:
        - '\(int\)'
        - 'int'
    - action: 's'
      args:
        - 'long, long'
        - 'long'
urlparse:
  match: 'import urlparse'
  prio: '9'
  do:
    - action: 's'
      args:
      - 'urlparse'
      - 'urllib.parse as urlparse'
from urlparse:
  match: 'from urlparse'
  prio: '9'
  do:
    - action: 's'
      args:
      - 'urlparse'
      - 'urllib.parse'
